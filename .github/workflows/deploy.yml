name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx turbo run build --filter=@kobipro/cleanfix
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder' }}

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --yes \
            --cwd apps/cleanfix \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=team_znw7eQLMSyTFvDxEhoYd8XsQ
        env:
          VERCEL_ORG_ID: team_znw7eQLMSyTFvDxEhoYd8XsQ
          VERCEL_PROJECT_ID: prj_LRwWnfLxEqvVAGat7giG9dNgNX3I
